openapi: 3.0.0
info:
  title: gemma-desktop-mcp Tools API
  description: gemma-desktop-mcp MCP 서버의 도구 명세 (FastMCP 3.2.4 기반)
  version: 1.0.0

# 참고: MCP 프로토콜은 OpenAPI가 아닌 JSON-RPC over stdio 사용
# 이 문서는 도구 인터페이스 문서화 목적으로 작성됨

paths:
  /ask_gemma:
    post:
      summary: Gemma4에게 질문
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                  description: 질문 내용
                model:
                  type: string
                  default: gemma4:26b
                  description: 사용할 모델명
                system_prompt:
                  type: string
                  description: 시스템 프롬프트 (선택)
              required: [prompt]

  /ask_gemma_with_files:
    post:
      summary: 파일을 포함해 Gemma4에게 질문
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                file_paths:
                  type: array
                  items:
                    type: string
                  description: 첨부할 파일 경로 목록
              required: [prompt, file_paths]

  /read_file:
    post:
      summary: 파일 읽기
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
                  description: 파일 절대 경로
              required: [path]

  /write_file:
    post:
      summary: 파일 쓰기 (홈 디렉토리 내부만 허용)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
                content:
                  type: string
                backup:
                  type: boolean
                  default: true
              required: [path, content]

  /run_shell:
    post:
      summary: 셸 명령어 실행 (위험 명령어 차단)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                command:
                  type: string
                cwd:
                  type: string
                  description: 실행 디렉토리 (선택)
                timeout:
                  type: integer
                  default: 30
              required: [command]

  /git_status:
    post:
      summary: Git 저장소 상태 확인
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                repo_path:
                  type: string
              required: [repo_path]

  /analyze_image:
    post:
      summary: 이미지 AI 분석 (Gemma4 비전)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                image_path:
                  type: string
                prompt:
                  type: string
                  default: "이 이미지를 분석해줘"
              required: [image_path]

  /search_files:
    post:
      summary: 파일 내용 검색 (grep)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                root_path:
                  type: string
                query:
                  type: string
                file_pattern:
                  type: string
                  default: "*"
              required: [root_path, query]

  /get_system_info:
    post:
      summary: 시스템 정보 조회 (GPU, 메모리, Ollama)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: {}
